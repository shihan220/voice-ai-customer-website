services:
  postgres:
    image: postgres:16-alpine
    container_name: bangla-voice-postgres
    environment:
      POSTGRES_DB: bangla_voice_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bangla_voice_postgres:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bangla_voice_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bangla_voice_postgres:
